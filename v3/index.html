<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Works — Graph View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    #graph { width: 100vw; height: 100vh; }

    /* HTML node labels */
    #labels {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .node-label {
      position: absolute;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
      transform: translate(-50%, -100%);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      transition: opacity 0.15s;
    }

    /* Node tooltip on hover */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(10, 10, 20, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 320px;
      font-size: 13px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 100;
    }

    #tooltip.visible { opacity: 1; }

    #tooltip .tt-title {
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      margin-bottom: 2px;
    }

    #tooltip .tt-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
      font-style: italic;
    }

    #tooltip .tt-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    #tooltip .tt-tags {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    #tooltip .tt-tag {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
    }

    /* Detail panel on click */
    #panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      height: 100vh;
      background: rgba(12, 12, 22, 0.95);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding: 32px 28px;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200;
      overflow-y: auto;
    }

    #panel.open { right: 0; }

    #panel .panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    #panel .panel-close:hover { color: #fff; }

    #panel .panel-type {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    #panel .panel-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    #panel .panel-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      font-style: italic;
      margin-bottom: 16px;
    }

    #panel .panel-field {
      margin-bottom: 14px;
    }

    #panel .panel-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 4px;
    }

    #panel .panel-value {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
    }

    #panel .panel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    #panel .panel-tag {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    #panel .panel-links {
      list-style: none;
    }

    #panel .panel-links li {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      transition: color 0.15s;
    }

    #panel .panel-links li:hover {
      color: #fff;
    }

    #panel .panel-links .link-weight {
      float: right;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    /* Legend */
    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 14px 18px;
      z-index: 50;
      font-size: 11px;
    }

    #legend .legend-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }

    #legend .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      color: rgba(255,255,255,0.6);
    }

    #legend .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Title overlay */
    #title-overlay {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 50;
    }

    #title-overlay h1 {
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: -0.3px;
    }

    #title-overlay p {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }
  </style>
</head>
<body>

<div id="graph"></div>
<div id="labels"></div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-subtitle"></div>
  <div class="tt-meta"></div>
  <div class="tt-tags"></div>
</div>

<div id="panel">
  <button class="panel-close" id="panel-close-btn">&times;</button>
  <div class="panel-type"></div>
  <div class="panel-title"></div>
  <div class="panel-subtitle"></div>
  <div class="panel-field">
    <div class="panel-label">Authors</div>
    <div class="panel-value panel-authors"></div>
  </div>
  <div class="panel-field">
    <div class="panel-label">Date</div>
    <div class="panel-value panel-date"></div>
  </div>
  <div class="panel-field">
    <div class="panel-label">Topics</div>
    <div class="panel-tags"></div>
  </div>
  <div class="panel-field">
    <div class="panel-label">Keywords</div>
    <div class="panel-value panel-keywords"></div>
  </div>
  <div class="panel-field">
    <div class="panel-label">Connected Outputs</div>
    <ul class="panel-links"></ul>
  </div>
</div>

<div id="legend">
  <div class="legend-title">Output Type</div>
</div>

<div id="title-overlay">
  <h1>Science Works</h1>
  <p>Output graph &middot; click to explore</p>
</div>

<script src="https://unpkg.com/3d-force-graph@1"></script>

<script>
const TYPE_COLORS = {
  'report':       '#4fc3f7',
  'essay':        '#ce93d8',
  'explorer':     '#81c784',
  'tool-release': '#ffb74d',
  'briefing':     '#ef9a9a',
};

const TYPE_LABELS = {
  'report':       'Report',
  'essay':        'Essay',
  'explorer':     'Explorer',
  'tool-release': 'Tool Release',
  'briefing':     'Briefing',
};

let graph;
let metadata = [];
let nodeById = {};
const labelEls = {};

fetch('dummy_metadata.json')
  .then(r => r.json())
  .then(data => {
    metadata = data;
    data.forEach(d => nodeById[d.id] = d);
    buildGraph(data);
    buildLegend();
  });

function buildGraph(data) {
  const nodes = data.map(d => ({
    id: d.id,
    title: d.title,
    subtitle: d.subtitle,
    type: d.type,
    authors: d.authors,
    tags: d.tags,
    keywords: d.keywords,
    date: d.date,
    prominence: d.prominence,
    linked: d.linked,
  }));

  // Deduplicate edges — take max weight for bidirectional links
  const edgeMap = {};
  data.forEach(d => {
    d.linked.forEach(([targetId, weight]) => {
      const key = [d.id, targetId].sort().join('--');
      if (!edgeMap[key] || weight > edgeMap[key].weight) {
        edgeMap[key] = { source: d.id, target: targetId, weight };
      }
    });
  });
  const links = Object.values(edgeMap);

  // Create HTML label elements
  const labelsContainer = document.getElementById('labels');
  nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'node-label';
    el.textContent = n.title;
    labelsContainer.appendChild(el);
    labelEls[n.id] = el;
  });

  graph = ForceGraph3D()(document.getElementById('graph'))
    .graphData({ nodes, links })
    .backgroundColor('#0a0a0f')
    .nodeVal(n => Math.pow(n.prominence, 1.5) * 8)
    .nodeColor(n => TYPE_COLORS[n.type] || '#888')
    .nodeOpacity(0.92)
    .nodeResolution(20)
    .nodeLabel('')
    .linkWidth(l => l.weight * 2.5)
    .linkColor(() => 'rgba(255,255,255,0.08)')
    .linkOpacity(0.6)
    .d3AlphaDecay(0.02)
    .d3VelocityDecay(0.3)
    .onNodeHover((node, prevNode) => {
      document.body.style.cursor = node ? 'pointer' : 'default';
      if (node) {
        showTooltip(node);
        highlightNode(node);
      } else {
        hideTooltip();
        clearHighlight();
      }
    })
    .onNodeClick(node => {
      openPanel(node);
      focusNode(node);
    })
    .onBackgroundClick(() => {
      closePanel();
    });

  // Tune forces
  graph.d3Force('charge').strength(-120);
  graph.d3Force('link').distance(l => (1 - l.weight) * 150 + 40);

  // Update HTML label positions each frame
  (function updateLabels() {
    requestAnimationFrame(updateLabels);
    const { nodes } = graph.graphData();
    nodes.forEach(node => {
      const el = labelEls[node.id];
      if (!el || node.x === undefined) return;
      const nodeR = Math.cbrt(Math.pow(node.prominence, 1.5) * 8) * 2;
      const coords = graph.graph2ScreenCoords(node.x, node.y - nodeR - 2, node.z);
      el.style.left = coords.x + 'px';
      el.style.top = coords.y + 'px';
    });
  })();
}

// Tooltip
function showTooltip(node) {
  const tooltip = document.getElementById('tooltip');
  tooltip.querySelector('.tt-title').textContent = node.title;
  tooltip.querySelector('.tt-subtitle').textContent = node.subtitle || '';
  tooltip.querySelector('.tt-meta').textContent =
    `${TYPE_LABELS[node.type] || node.type} · ${node.authors.join(', ')} · ${formatDate(node.date)}`;
  tooltip.querySelector('.tt-tags').innerHTML =
    node.tags.map(t => `<span class="tt-tag">${t}</span>`).join('');
  tooltip.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

document.addEventListener('mousemove', e => {
  const tt = document.getElementById('tooltip');
  if (tt.classList.contains('visible')) {
    tt.style.left = (e.clientX + 16) + 'px';
    tt.style.top = (e.clientY - 10) + 'px';
  }
});

// Highlight
let highlightedNodes = new Set();
let highlightedLinks = new Set();

function highlightNode(node) {
  highlightedNodes.clear();
  highlightedLinks.clear();
  highlightedNodes.add(node.id);

  const { links } = graph.graphData();
  links.forEach(l => {
    const srcId = typeof l.source === 'object' ? l.source.id : l.source;
    const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
    if (srcId === node.id || tgtId === node.id) {
      highlightedNodes.add(srcId);
      highlightedNodes.add(tgtId);
      highlightedLinks.add(l);
    }
  });

  graph
    .nodeColor(n => {
      return highlightedNodes.has(n.id)
        ? TYPE_COLORS[n.type] || '#888'
        : 'rgba(60,60,80,0.3)';
    })
    .linkColor(l => {
      return highlightedLinks.has(l)
        ? 'rgba(255,255,255,0.3)'
        : 'rgba(255,255,255,0.03)';
    });
}

function clearHighlight() {
  highlightedNodes.clear();
  highlightedLinks.clear();
  graph
    .nodeColor(n => TYPE_COLORS[n.type] || '#888')
    .linkColor(() => 'rgba(255,255,255,0.08)');
}

// Detail panel
function openPanel(node) {
  const panel = document.getElementById('panel');
  panel.querySelector('.panel-type').textContent = TYPE_LABELS[node.type] || node.type;
  panel.querySelector('.panel-type').style.color = TYPE_COLORS[node.type] || '#888';
  panel.querySelector('.panel-title').textContent = node.title;
  panel.querySelector('.panel-subtitle').textContent = node.subtitle || '';
  panel.querySelector('.panel-authors').textContent = node.authors.join(', ');
  panel.querySelector('.panel-date').textContent = formatDate(node.date);
  panel.querySelector('.panel-tags').innerHTML =
    node.tags.map(t => `<span class="panel-tag">${t}</span>`).join('');
  panel.querySelector('.panel-keywords').textContent = node.keywords.join(', ');

  const linksList = panel.querySelector('.panel-links');
  linksList.innerHTML = '';
  node.linked.forEach(([id, weight]) => {
    const target = nodeById[id];
    if (!target) return;
    const li = document.createElement('li');
    li.innerHTML = `${target.title} <span class="link-weight">${weight.toFixed(1)}</span>`;
    li.addEventListener('click', () => {
      const { nodes } = graph.graphData();
      const targetNode = nodes.find(n => n.id === id);
      if (targetNode) {
        openPanel(targetNode);
        focusNode(targetNode);
      }
    });
    linksList.appendChild(li);
  });

  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

document.getElementById('panel-close-btn').addEventListener('click', closePanel);

// Camera focus
function focusNode(node) {
  const distance = 120;
  const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
  graph.cameraPosition(
    { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
    { x: node.x, y: node.y, z: node.z },
    1200
  );
}

// Legend
function buildLegend() {
  const legend = document.getElementById('legend');
  Object.entries(TYPE_LABELS).forEach(([type, label]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${TYPE_COLORS[type]}"></span>${label}`;
    legend.appendChild(item);
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
</script>

</body>
</html>
