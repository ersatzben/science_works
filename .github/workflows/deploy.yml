name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to main…
  push:
    branches: [main]
  # …and allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight run finish rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

# Per-repo environment. Set the SITE_URL repo variable
# (Settings → Secrets and variables → Actions → Variables):
#   production repo: https://science.works
#   staging repo:    https://staging.science.works   (or leave unset → falls back below)
env:
  SITE_URL: ${{ vars.SITE_URL || 'https://staging.science.works' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium for PDF generation
        run: npx playwright install --with-deps chromium   # used by the build's postbuild PDF step
      - name: Build with Astro
        run: npm run build              # runs astro build, then postbuild → writing PDFs
      - name: Write CNAME (custom domain)
        run: echo "${SITE_URL#https://}" > dist/CNAME   # strip scheme → bare host
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
