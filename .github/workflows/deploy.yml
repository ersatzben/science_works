name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SITE_URL: ${{ vars.SITE_URL || 'https://staging.science.works' }}
  PRODUCTION: ${{ vars.PRODUCTION || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium for PDF generation
        run: npx playwright install --with-deps chromium   # used by the build's postbuild PDF step
      - name: Build with Astro
        run: npm run build              # runs astro build, then postbuild → writing PDFs
      - name: Write CNAME (custom domain)
        run: echo "${SITE_URL#https://}" > dist/CNAME   # strip scheme → bare host
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
