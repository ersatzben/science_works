<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viscous Blob 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f2efea;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: true, alpha: false });
const extDeriv = gl.getExtension('OES_standard_derivatives');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// ── Mouse tracking ──
let mouseX = -9999, mouseY = -9999;
const PUSH_RADIUS = 180;
const PUSH_STRENGTH = 120;

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mouseleave', () => {
  mouseX = -9999;
  mouseY = -9999;
});

// Bump MAX_BALLS — each major blob is now 3 sub-balls for deformation
const MAX_BALLS = 30;

const vsSource = `
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const fsSource = `
#extension GL_OES_standard_derivatives : enable
precision highp float;
uniform vec3 uBalls[${MAX_BALLS}];
uniform int uNumBalls;
uniform float uTime;

const vec3 BG = vec3(0.95, 0.94, 0.92);
const vec3 BASE_COLOR = vec3(0.88, 0.30, 0.25);
const vec3 HIGHLIGHT_COLOR = vec3(0.95, 0.42, 0.34);

float metafield(vec2 p) {
  float f = 0.0;
  for (int i = 0; i < ${MAX_BALLS}; i++) {
    if (i >= uNumBalls) break;
    vec2 d = p - uBalls[i].xy;
    float r = uBalls[i].z;
    f += (r * r) / (dot(d, d) + 1.0);
  }
  return f;
}

vec2 fieldGradient(vec2 p) {
  vec2 g = vec2(0.0);
  for (int i = 0; i < ${MAX_BALLS}; i++) {
    if (i >= uNumBalls) break;
    vec2 d = p - uBalls[i].xy;
    float r = uBalls[i].z;
    float den = dot(d, d) + 1.0;
    g += -2.0 * r * r * d / (den * den);
  }
  return g;
}

void main() {
  vec2 uv = gl_FragCoord.xy;
  float field = metafield(uv);

  float fw = fwidth(field);
  float edge = smoothstep(1.0 - fw * 0.5, 1.0 + fw * 0.5, field);

  float shadowField = metafield(uv + vec2(-25.0, 25.0));
  float shadowAlpha = smoothstep(0.6, 1.4, shadowField) * 0.18;
  vec3 bgColor = BG - shadowAlpha;

  if (edge < 0.001) {
    float grain = (fract(sin(dot(uv * 0.01 + uTime * 0.0005, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) * 0.025;
    gl_FragColor = vec4(bgColor + grain, 1.0);
    return;
  }

  // ── Edge normal (from field gradient) — drives diffuse shading & edge darkening ──
  vec2 grad = fieldGradient(uv);
  float zComp = 18.0;
  float depth = clamp((field - 1.0) / 2.5, 0.0, 1.0);
  vec3 N_edge = normalize(vec3(-grad, zComp * (0.4 + depth * 0.6)));

  // ── Dome normal (from weighted center) — drives specular reflection ──
  // Compute weighted average of blob centers, weighted by each blob's field contribution.
  // Then derive a hemisphere normal as if standing on a dome centered there.
  vec2 weightedCenter = vec2(0.0);
  float totalWeight = 0.0;
  float dominantRadius = 0.0;
  for (int i = 0; i < ${MAX_BALLS}; i++) {
    if (i >= uNumBalls) break;
    vec2 d = uv - uBalls[i].xy;
    float r = uBalls[i].z;
    float w = (r * r) / (dot(d, d) + 1.0);
    weightedCenter += uBalls[i].xy * w;
    totalWeight += w;
    if (w > dominantRadius) dominantRadius = r; // track largest contributor's radius
  }
  weightedCenter /= totalWeight;

  // Distance from pixel to weighted center, normalized by dominant blob radius
  vec2 fromCenter = uv - weightedCenter;
  float normDist = length(fromCenter) / (dominantRadius * 1.2);
  normDist = min(normDist, 1.0);

  // Dome normal: tilts away from center, z decreases at edges
  float domeZ = sqrt(max(1.0 - normDist * normDist, 0.01));
  vec3 N_dome = normalize(vec3(fromCenter / (dominantRadius * 1.2), domeZ));

  // ── Lighting ──
  vec3 L1 = normalize(vec3(-0.5, 0.6, 0.75));
  vec3 L2 = normalize(vec3(0.5, -0.2, 0.6));
  vec3 V = vec3(0.0, 0.0, 1.0);
  vec3 H1 = normalize(L1 + V);
  vec3 H2 = normalize(L2 + V);

  // Diffuse uses edge normal (good edge shading)
  float diff1 = max(dot(N_edge, L1), 0.0);
  float diff2 = max(dot(N_edge, L2), 0.0);

  // Specular uses dome normal (smooth reflection across entire surface)
  float spec1_tight = pow(max(dot(N_dome, H1), 0.0), 120.0);
  float spec1_broad = pow(max(dot(N_dome, H1), 0.0), 12.0);
  float spec2 = pow(max(dot(N_dome, H2), 0.0), 60.0);

  // Fresnel uses dome normal
  float NdotV = max(dot(N_dome, V), 0.0);
  float fresnel = pow(1.0 - NdotV, 1.8);

  // Environment reflection uses dome normal
  vec3 R = reflect(-V, N_dome);
  float envT = R.y * 0.5 + 0.5;
  vec3 envColor = mix(
    vec3(0.72, 0.58, 0.52),
    vec3(1.0, 0.97, 0.94),
    envT
  );

  float thickness = clamp((field - 1.0) / 1.5, 0.0, 1.0);
  float sss = (1.0 - thickness) * 0.2;

  // Shadow color: slightly darker but stays vibrant (not muddy brown)
  vec3 shadowColor = vec3(0.75, 0.20, 0.16);
  vec3 surfColor = mix(shadowColor, HIGHLIGHT_COLOR, diff1 * 0.6 + diff2 * 0.2);
  surfColor += BASE_COLOR * 0.2;
  surfColor += vec3(1.0, 0.98, 0.96) * spec1_tight * 1.2;
  surfColor += vec3(1.0, 0.96, 0.93) * spec1_broad * 0.2;
  surfColor += vec3(0.98, 0.95, 0.93) * spec2 * 0.4;
  surfColor = mix(surfColor, envColor, fresnel * 0.45);
  surfColor += vec3(1.0, 0.5, 0.35) * sss * 0.15;

  float ao = smoothstep(1.0, 2.0, field);
  // AO: blend between warm tint and plain darkening (halfway)
  vec3 aoTint = vec3(0.85, 0.28, 0.20);
  vec3 aoDark = surfColor * 0.78;                    // v16 plain darkening
  vec3 aoWarm = mix(aoTint, surfColor, 0.7);         // v18 warm tint
  vec3 aoColor = mix(aoDark, aoWarm, 0.75);          // 3/4 toward warm
  surfColor = mix(aoColor, surfColor, ao);

  vec3 color = mix(bgColor, surfColor, edge);

  float grain = (fract(sin(dot(uv * 0.01 + uTime * 0.0005, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) * 0.02;
  color += grain;

  gl_FragColor = vec4(color, 1.0);
}
`;

function createShader(type, source) {
  const s = gl.createShader(type);
  gl.shaderSource(s, source);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:', gl.getShaderInfoLog(s));
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vsSource));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error('Program link error:', gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'uTime');
const uBalls = gl.getUniformLocation(prog, 'uBalls');
const uNumBalls = gl.getUniformLocation(prog, 'uNumBalls');

const TAU = Math.PI * 2;

// ── Blob architecture ──
// Each major blob is a GROUP of 3 sub-balls that share the same base motion
// but have independent offsets that oscillate, causing the group to deform.
// This makes each blob stretch, squash, and bend organically.
//
// Varied sizes: one large, two medium-large, one medium, one smaller.

const blobGroups = [
  { // Large blob
    groupRadius: 38,  // sub-ball radius
    subBalls: 3,
    spread: 22,       // how far sub-balls spread from group center
    xWaves: [{freq: 0.08, amp: 0.85, phase: 0.0},  {freq: 0.19, amp: 0.25, phase: 2.1}],
    yWaves: [{freq: 0.065, amp: 0.80, phase: 1.0},  {freq: 0.16, amp: 0.22, phase: 4.3}],
    deform: [
      {xFreq: 0.13, yFreq: 0.11, xPhase: 0.0, yPhase: 1.5},
      {xFreq: 0.10, yFreq: 0.14, xPhase: 2.5, yPhase: 0.3},
      {xFreq: 0.15, yFreq: 0.09, xPhase: 4.8, yPhase: 3.7},
    ],
  },
  { // Large blob
    groupRadius: 40,
    subBalls: 3,
    spread: 24,
    xWaves: [{freq: 0.07, amp: 0.90, phase: 3.5},  {freq: 0.17, amp: 0.28, phase: 0.8}],
    yWaves: [{freq: 0.09, amp: 0.85, phase: 5.2},  {freq: 0.21, amp: 0.20, phase: 1.6}],
    deform: [
      {xFreq: 0.12, yFreq: 0.15, xPhase: 1.2, yPhase: 4.0},
      {xFreq: 0.16, yFreq: 0.10, xPhase: 3.8, yPhase: 2.1},
      {xFreq: 0.09, yFreq: 0.13, xPhase: 5.5, yPhase: 0.6},
    ],
  },
  { // Medium-large blob
    groupRadius: 32,
    subBalls: 3,
    spread: 20,
    xWaves: [{freq: 0.095, amp: 0.92, phase: 1.7}, {freq: 0.22, amp: 0.22, phase: 5.5}],
    yWaves: [{freq: 0.075, amp: 0.78, phase: 3.8}, {freq: 0.18, amp: 0.25, phase: 0.4}],
    deform: [
      {xFreq: 0.14, yFreq: 0.12, xPhase: 2.0, yPhase: 5.2},
      {xFreq: 0.11, yFreq: 0.16, xPhase: 0.5, yPhase: 3.3},
      {xFreq: 0.17, yFreq: 0.08, xPhase: 4.1, yPhase: 1.8},
    ],
  },
  { // Medium blob
    groupRadius: 28,
    subBalls: 2,
    spread: 16,
    xWaves: [{freq: 0.06, amp: 0.82, phase: 5.0},  {freq: 0.15, amp: 0.30, phase: 3.2}],
    yWaves: [{freq: 0.1, amp: 0.88, phase: 0.5},   {freq: 0.23, amp: 0.18, phase: 2.8}],
    deform: [
      {xFreq: 0.13, yFreq: 0.17, xPhase: 3.0, yPhase: 0.9},
      {xFreq: 0.18, yFreq: 0.11, xPhase: 5.8, yPhase: 2.5},
    ],
  },
  { // Smaller blob
    groupRadius: 22,
    subBalls: 2,
    spread: 14,
    xWaves: [{freq: 0.085, amp: 0.88, phase: 2.3}, {freq: 0.2, amp: 0.24, phase: 4.7}],
    yWaves: [{freq: 0.07, amp: 0.84, phase: 4.0},  {freq: 0.165, amp: 0.26, phase: 1.1}],
    deform: [
      {xFreq: 0.15, yFreq: 0.12, xPhase: 1.7, yPhase: 4.4},
      {xFreq: 0.10, yFreq: 0.18, xPhase: 4.2, yPhase: 0.1},
    ],
  },
  { // Medium wanderer
    groupRadius: 24,
    subBalls: 2,
    spread: 15,
    xWaves: [{freq: 0.09, amp: 1.1, phase: 4.2},  {freq: 0.21, amp: 0.35, phase: 1.6}],
    yWaves: [{freq: 0.11, amp: 1.05, phase: 2.0},  {freq: 0.19, amp: 0.30, phase: 5.4}],
    deform: [
      {xFreq: 0.14, yFreq: 0.16, xPhase: 0.8, yPhase: 3.6},
      {xFreq: 0.17, yFreq: 0.10, xPhase: 5.1, yPhase: 1.2},
    ],
  },
];

// Small independent droplets (single balls, no deformation)
const smalls = [
  { radius: 10,
    xWaves: [{freq: 0.11, amp: 0.95, phase: 1.2}, {freq: 0.24, amp: 0.28, phase: 3.8}],
    yWaves: [{freq: 0.095, amp: 0.92, phase: 4.5},{freq: 0.22, amp: 0.25, phase: 0.7}],
  },
  { radius: 6,
    xWaves: [{freq: 0.1, amp: 0.98, phase: 5.1},  {freq: 0.25, amp: 0.30, phase: 2.0}],
    yWaves: [{freq: 0.12, amp: 0.90, phase: 2.3}, {freq: 0.21, amp: 0.22, phase: 5.9}],
  },
  { radius: 12,
    xWaves: [{freq: 0.09, amp: 0.93, phase: 3.3}, {freq: 0.23, amp: 0.26, phase: 1.5}],
    yWaves: [{freq: 0.105, amp: 0.95, phase: 0.9},{freq: 0.26, amp: 0.20, phase: 4.2}],
  },
  { radius: 4,
    xWaves: [{freq: 0.13, amp: 1.0, phase: 0.4},  {freq: 0.27, amp: 0.24, phase: 5.3}],
    yWaves: [{freq: 0.115, amp: 0.97, phase: 3.1},{freq: 0.24, amp: 0.28, phase: 1.8}],
  },
];

// Build a flat list of all renderable items for repel tracking
// Each group's sub-balls share the same repel offset
const allItems = []; // { groupIdx, subIdx } or { smallIdx }
let totalSubBalls = 0;
for (let g = 0; g < blobGroups.length; g++) {
  totalSubBalls += blobGroups[g].subBalls;
}
const totalBalls = totalSubBalls + smalls.length;

// Repel offsets: one per group + one per small droplet
const repelOffsets = [];
for (let i = 0; i < blobGroups.length + smalls.length; i++) {
  repelOffsets.push({ x: 0, y: 0 });
}

function evalWaves(waves, t, halfBox) {
  let v = 0;
  for (const w of waves) v += Math.sin(t * w.freq + w.phase) * w.amp * halfBox;
  return v;
}

let time = 0;

function update(dt) {
  time += dt * 1.15;

  const _dpr = window.devicePixelRatio || 1;
  const _cx = (window.innerWidth / 2) * _dpr;
  const _cy = (window.innerHeight / 2) * _dpr;

  const minDim = Math.min(window.innerWidth, window.innerHeight) * _dpr;
  const boxSize = minDim * (9 / 16);
  const halfBox = boxSize / 2;

  // Continuous push: cursor adds force every frame (no cap).
  // Decay gently pulls offset back toward zero.
  const decayRate = 1 - Math.exp(-dt * 0.5);
  const pushRate = 90; // CSS px/sec of push at full proximity

  const data = [];

  // Process blob groups
  for (let g = 0; g < blobGroups.length; g++) {
    const grp = blobGroups[g];

    // Group center position
    let cx = evalWaves(grp.xWaves, time, halfBox);
    let cy = evalWaves(grp.yWaves, time, halfBox);
    const limit = halfBox - grp.groupRadius * _dpr * 1.5;
    cx = limit * Math.tanh(cx / limit);
    cy = limit * Math.tanh(cy / limit);

    // Repel for this group
    const ro = repelOffsets[g];
    const curCssX = (window.innerWidth / 2) + cx / _dpr + ro.x;
    const curCssY = (window.innerHeight / 2) - cy / _dpr + ro.y;
    const dx = curCssX - mouseX;
    const dy = curCssY - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Continuously add force while cursor is nearby
    if (dist < PUSH_RADIUS && dist > 0.1) {
      const proximity = Math.pow(1 - dist / PUSH_RADIUS, 2);
      const sizeFactor = Math.max(35 / grp.groupRadius, 1.5);
      const push = pushRate * proximity * sizeFactor * dt;
      ro.x += (dx / dist) * push;
      ro.y += (dy / dist) * push;
    }

    // Always decay toward zero (gentle spring back)
    ro.x -= ro.x * decayRate;
    ro.y -= ro.y * decayRate;

    // Emit sub-balls with deformation offsets
    for (let s = 0; s < grp.subBalls; s++) {
      const def = grp.deform[s];
      // Sub-ball offset oscillates around the group center
      const offX = Math.sin(time * def.xFreq + def.xPhase) * grp.spread * _dpr;
      const offY = Math.sin(time * def.yFreq + def.yPhase) * grp.spread * _dpr;

      data.push(
        _cx + cx + offX + ro.x * _dpr,
        _cy + cy + offY - ro.y * _dpr,
        grp.groupRadius * _dpr
      );
    }
  }

  // Process small droplets
  for (let s = 0; s < smalls.length; s++) {
    const sm = smalls[s];
    const roIdx = blobGroups.length + s;
    const ro = repelOffsets[roIdx];

    let bx = evalWaves(sm.xWaves, time, halfBox);
    let by = evalWaves(sm.yWaves, time, halfBox);
    const limit = halfBox - sm.radius * _dpr;
    bx = limit * Math.tanh(bx / limit);
    by = limit * Math.tanh(by / limit);

    const curCssX = (window.innerWidth / 2) + bx / _dpr + ro.x;
    const curCssY = (window.innerHeight / 2) - by / _dpr + ro.y;
    const dx = curCssX - mouseX;
    const dy = curCssY - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < PUSH_RADIUS && dist > 0.1) {
      const proximity = Math.pow(1 - dist / PUSH_RADIUS, 2);
      const sizeFactor = 35 / sm.radius;
      const push = pushRate * proximity * sizeFactor * dt;
      ro.x += (dx / dist) * push;
      ro.y += (dy / dist) * push;
    }

    ro.x -= ro.x * decayRate;
    ro.y -= ro.y * decayRate;

    data.push(
      _cx + bx + ro.x * _dpr,
      _cy + by - ro.y * _dpr,
      sm.radius * _dpr
    );
  }

  const total = Math.min(data.length / 3, MAX_BALLS);
  const uniform = new Float32Array(MAX_BALLS * 3);
  for (let i = 0; i < total * 3; i++) uniform[i] = data[i];

  gl.uniform1f(uTime, time);
  gl.uniform3fv(uBalls, uniform);
  gl.uniform1i(uNumBalls, total);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
